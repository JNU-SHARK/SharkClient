name: CI

on:
  push:
    branches: [main, Lite, "refactor/**"]
  pull_request:
    branches: [main, Lite]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  rust:
    name: rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install Linux Tauri prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            build-essential

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo check (default features)
        run: cargo check --all-targets

      - name: cargo test
        # Placeholder — real tests land in stage S4. Until then this stays
        # green because there are no integration tests under src-tauri/tests.
        run: cargo test --no-fail-fast

  frontend:
    name: frontend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: npm ci
        run: npm ci --no-audit --no-fund

      - name: Generate MQTT proto JSON
        run: npm run generate:mqtt-proto

      - name: Type-check & build (vite)
        # `npm run build` runs `vite build` which invokes vue-tsc indirectly
        # via the build pipeline. The `prebuild` hook regenerates proto.
        run: npm run build

      - name: Frontend tests (placeholder)
        # Real vitest config arrives in stage S4. `--if-present` keeps CI
        # green until the script exists.
        run: npm test --if-present
